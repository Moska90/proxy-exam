<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calamot Nexus | Intelligent Infrastructure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(244, 63, 94, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section {
            position: relative;
            height: 400px;
            width: 100%;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            transition: transform 0.5s ease;
        }

        .hero-section:hover .hero-image {
            transform: scale(1.05);
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem;
            background: linear-gradient(to top, var(--card-bg), transparent);
        }

        .eyebrow {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content {
            padding: 3rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .description {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .video-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .status-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .status-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .status-value {
            font-weight: 600;
            color: #fff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 999px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            margin-top: 1rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        @media (max-width: 768px) {
            .content { grid-template-columns: 1fr; }
            h1 { font-size: 3rem; }
            .hero-section { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="hero-section">
                <img src="calamot_hero.jpg" alt="Hero" class="hero-image">
                <div class="hero-overlay">
                    <span class="eyebrow">Enterprise Grade</span>
                    <h1>Calamot Nexus</h1>
                </div>
            </div>
            
            <div class="content">
                <div class="info">
                    <p class="description">
                        Experience the power of high-availability infrastructure. Our distributed network ensures your applications stay online, resilient, and blazing fast.
                    </p>
                    <div class="badge">
                        <div class="pulse"></div>
                        System Operational
                    </div>
                    
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="status-label">Protocol</span>
                            <span class="status-value">HTTP/1.1</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Cluster</span>
                            <span class="status-value">Node-Balanced</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Uptime</span>
                            <span class="status-value">99.9%</span>
                        </div>
                    </div>
                </div>

                <div class="media">
                    <div class="video-container">
                        <video autoplay muted loop playsinline poster="calamot_hero.jpg">
                            <source src="calamot.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
